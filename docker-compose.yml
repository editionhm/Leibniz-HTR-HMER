version: '3.8'

services:
  webapp:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: leibniz-webapp
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - BACKEND_PORT=8000
      - MOCK_MODE=${MOCK_MODE:-false}
      - MODEL_NAME_OR_PATH=${MODEL_NAME_OR_PATH:-Qwen/Qwen2-VL-2B-Instruct}
      - LORA_ADAPTER_PATH=${LORA_ADAPTER_PATH:-}
      - DEVICE=${DEVICE:-cuda}
      - LOAD_IN_4BIT=${LOAD_IN_4BIT:-true}
      - MAX_NEW_TOKENS=${MAX_NEW_TOKENS:-512}
      - TEMPERATURE=${TEMPERATURE:-0.0}
    volumes:
      # Optional: Mount checkpoints directory to container if loading weights locally
      - ./checkpoints:/app/checkpoints
    # The deploy block configuration ensures Nvidia GPU accessibility inside Docker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
